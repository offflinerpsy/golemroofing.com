name: Live Site Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/site-smoke.yml"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.js"
      - "tests/**"
      - "tools/golem-site-monitor.php"

jobs:
  smoke:
    name: Playwright live smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run live smoke tests
        env:
          PLAYWRIGHT_BASE_URL: https://golemroofing.com
        run: npm run smoke:live

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
